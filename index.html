<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de Resistência</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#0a0a0a;
    color:#f5f5f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:#141414;
    border:1px solid #222;
    border-radius:24px;
    padding:30px;
    text-align:center;
}

.days{
    font-size:72px;
    font-weight:800;
}

.label{
    color:#888;
    margin-bottom:25px;
}

.rank{
    background:#1d1d1d;
    border-radius:14px;
    padding:15px;
    margin-bottom:25px;
    border:1px solid #2a2a2a;
}

.rank-title{
    color:#c28b36;
    font-size:18px;
    font-weight:700;
}

.quote{
    color:#9c9c9c;
    margin-top:8px;
    font-size:14px;
}

button{
    width:100%;
    border:none;
    padding:16px;
    border-radius:14px;
    background:#c28b36;
    color:black;
    font-weight:800;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.progress{
    height:12px;
    background:#222;
    border-radius:999px;
    margin:25px 0 15px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:#c28b36;
}

.stats{
    display:flex;
    gap:12px;
}

.box{
    flex:1;
    background:#1d1d1d;
    border:1px solid #2a2a2a;
    border-radius:12px;
    padding:16px;
}

.number{
    font-size:30px;
    font-weight:800;
    color:#c28b36;
}

.text{
    margin-top:5px;
    color:#8a8a8a;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<div class="days" id="days">0</div>
<div class="label">dias válidos</div>

<div class="rank">
<div class="rank-title" id="title">Condenado</div>
<div class="quote" id="quote">Todo começo parece promissor.</div>
</div>

<button onclick="checkin()">CHECK-IN</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="stats">
<div class="box">
<div class="number" id="checks">0</div>
<div class="text">Hoje</div>
</div>

<div class="box">
<div class="number" id="left">4</div>
<div class="text">Faltam</div>
</div>
</div>

</div>

<script>

const GOAL = 4;

/* 🔥 TITULOS POR SEMANA (5 meses ~ 20 semanas) */
const WEEK_TITLES = [
"Semana 1 — Queda inicial",
"Semana 2 — Resistência fraca",
"Semana 3 — Tentativa instável",
"Semana 4 — Início de controle",
"Semana 5 — Disciplina surgindo",
"Semana 6 — Resistência real",
"Semana 7 — Controle parcial",
"Semana 8 — Estabilidade frágil",
"Semana 9 — Mente dividida",
"Semana 10 — Controle moderado",
"Semana 11 — Força consistente",
"Semana 12 — Autodomínio inicial",
"Semana 13 — Evolução clara",
"Semana 14 — Resistência sólida",
"Semana 15 — Controle forte",
"Semana 16 — Mente disciplinada",
"Semana 17 — Domínio avançado",
"Semana 18 — Quase estabilidade total",
"Semana 19 — Forte consolidação",
"Semana 20 — Estado de domínio"
];

/* INIT CACHE */
if(!localStorage.getItem("days")) localStorage.setItem("days","0");
if(!localStorage.getItem("checks")) localStorage.setItem("checks","0");
if(!localStorage.getItem("done")) localStorage.setItem("done","false");
if(!localStorage.getItem("lastDay")) localStorage.setItem("lastDay", new Date().toDateString());

/* 🔥 RESET POR DIA */
function resetDayIfNeeded(){

let today = new Date().toDateString();
let saved = localStorage.getItem("lastDay");

if(today !== saved){
    localStorage.setItem("checks","0");
    localStorage.setItem("done","false");
    localStorage.setItem("lastDay", today);
}

}

/* SEMANA BASEADA EM DIAS */
function getWeekTitle(days){

let week = Math.floor(days / 7);

if(week >= WEEK_TITLES.length){
    week = WEEK_TITLES.length - 1;
}

return WEEK_TITLES[week];
}

/* CHECK-IN */
function checkin(){

resetDayIfNeeded();

let c = Number(localStorage.getItem("checks"));

if(c >= GOAL) return;

c++;
localStorage.setItem("checks", c);

/* +1 DIA AO COMPLETAR */
if(c === GOAL && localStorage.getItem("done") !== "true"){

    let d = Number(localStorage.getItem("days"));
    localStorage.setItem("days", d + 1);
    localStorage.setItem("done","true");

}

update();
}

/* UI */
function update(){

resetDayIfNeeded();

let d = Number(localStorage.getItem("days"));
let c = Number(localStorage.getItem("checks"));

document.getElementById("days").innerText = d;
document.getElementById("checks").innerText = c;
document.getElementById("left").innerText = Math.max(0, GOAL - c);

/* 🔥 TITULO POR SEMANA */
document.getElementById("title").innerText = getWeekTitle(d);

document.getElementById("quote").innerText =
(c >= GOAL)
? "Dia concluído ✔"
: "Continue...";

document.getElementById("bar").style.width =
(c / GOAL) * 100 + "%";

}

update();

</script>

</body>
</html>
